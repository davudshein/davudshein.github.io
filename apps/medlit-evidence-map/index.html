<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedLit Evidence Map</title>
<style>
:root{--bg:#08090d;--panel:#141620;--line:#2a2e3b;--text:#f6f4ef;--muted:#a8abb5;--accent:#b66cff;--red:#e34b55;--green:#82e0ac;--amber:#f4c86a}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0%,rgba(182,108,255,.15),transparent 30%),radial-gradient(circle at 90% 20%,rgba(130,224,172,.1),transparent 30%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;opacity:.15;pointer-events:none}
main{max-width:1180px;margin:auto;padding:42px 22px;position:relative}a{color:inherit}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:28px}.kicker{color:var(--accent);text-transform:uppercase;letter-spacing:.18em;font-size:.76rem;font-weight:900}
h1{font-size:clamp(2.8rem,7vw,6rem);line-height:.9;letter-spacing:-.07em;margin:8px 0 14px}h2,h3{letter-spacing:-.03em}.muted,p{color:var(--muted);line-height:1.65}.panel,.card{border:1px solid var(--line);background:linear-gradient(145deg,var(--panel),rgba(255,255,255,.035));border-radius:26px;padding:24px;box-shadow:0 28px 80px rgba(0,0,0,.26)}.btn,button,select,input,textarea{font:inherit}
.btn,button{border:1px solid var(--line);background:#1b1d28;color:var(--text);border-radius:999px;padding:12px 18px;font-weight:800;cursor:pointer}.btn:hover,button:hover{border-color:var(--accent)}select,input,textarea{width:100%;border:1px solid var(--line);background:#10121a;color:var(--text);border-radius:16px;padding:14px}textarea{min-height:230px;resize:vertical}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}.chips{display:flex;gap:8px;flex-wrap:wrap}.chips span{border:1px solid var(--line);border-radius:999px;padding:6px 10px;color:var(--muted);font-size:.85rem}.stat{font-size:2.2rem;font-weight:950}.good{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--amber)}ul{line-height:1.85;color:var(--muted)}canvas{width:100%;height:auto;border:1px solid var(--line);border-radius:22px;background:#0b0d14}.section{margin-top:24px}@media(max-width:760px){.grid,.grid3{grid-template-columns:1fr}h1{font-size:3.2rem}}
</style>
</head>
<body>
<main>
  <div class="top">
    <div>
      <div class="kicker">David Shen Project</div>
      <h1>MedLit Evidence Map</h1>
      <p class="muted">Filter and visualize a toy biomedical literature dataset.</p>
    </div>
    <a class="btn" href="../../index.html">All projects</a>
  </div>
  
<div class="grid3">
  <label><strong>Disease</strong><select id="disease"><option>All</option><option>Alzheimer's</option><option>Rare disease</option><option>Cancer</option><option>Cardiology</option><option>Metabolic</option></select></label>
  <label><strong>Method</strong><select id="method"><option>All</option><option>ML</option><option>RNA-seq</option><option>Clinical</option><option>Imaging</option><option>Review</option></select></label>
  <label><strong>Evidence</strong><select id="evidence"><option>All</option><option>Model</option><option>Experiment</option><option>Trial</option><option>Review</option></select></label>
</div>
<section class="panel section">
  <div class="grid3">
    <div><div class="stat" id="paperCount">0</div><p>Papers shown</p></div>
    <div><div class="stat" id="sampleTotal">0</div><p>Total sample size</p></div>
    <div><div class="stat" id="topMethod">—</div><p>Most common method</p></div>
  </div>
  <canvas id="chart" width="980" height="330"></canvas>
</section>
<section class="section">
  <div id="papers" class="grid3"></div>
</section>

</main>
<script>

const data = [
  {title:"BACE1 inhibitor QSAR benchmark", disease:"Alzheimer's", method:"ML", evidence:"Model", n:128, tag:"drug discovery"},
  {title:"Amyloid imaging risk model", disease:"Alzheimer's", method:"Imaging", evidence:"Model", n:220, tag:"neuroimaging"},
  {title:"Long-read RNA diagnostic yield", disease:"Rare disease", method:"RNA-seq", evidence:"Experiment", n:64, tag:"TEQUILA-Dx"},
  {title:"Splice-junction abnormality screen", disease:"Rare disease", method:"RNA-seq", evidence:"Experiment", n:86, tag:"splicing"},
  {title:"Gene expression outlier review", disease:"Rare disease", method:"Review", evidence:"Review", n:42, tag:"expression"},
  {title:"Oncology biomarker trial", disease:"Cancer", method:"Clinical", evidence:"Trial", n:310, tag:"biomarkers"},
  {title:"Drug response predictor", disease:"Cancer", method:"ML", evidence:"Model", n:142, tag:"response"},
  {title:"Cancer RNA fusion panel", disease:"Cancer", method:"RNA-seq", evidence:"Experiment", n:95, tag:"fusion"},
  {title:"Arrhythmia ECG classifier", disease:"Cardiology", method:"ML", evidence:"Model", n:510, tag:"ECG"},
  {title:"Heart failure medication trial", disease:"Cardiology", method:"Clinical", evidence:"Trial", n:760, tag:"trial"},
  {title:"Coronary calcium imaging study", disease:"Cardiology", method:"Imaging", evidence:"Experiment", n:388, tag:"imaging"},
  {title:"Diabetes risk prediction", disease:"Metabolic", method:"ML", evidence:"Model", n:940, tag:"risk"},
  {title:"Obesity intervention review", disease:"Metabolic", method:"Review", evidence:"Review", n:120, tag:"lifestyle"},
  {title:"Lipid biomarker cohort", disease:"Metabolic", method:"Clinical", evidence:"Experiment", n:284, tag:"cohort"},
  {title:"BACE1 docking model", disease:"Alzheimer's", method:"ML", evidence:"Model", n:74, tag:"docking"},
  {title:"Rare neuromuscular RNA case series", disease:"Rare disease", method:"RNA-seq", evidence:"Experiment", n:18, tag:"case series"},
  {title:"Immunotherapy eligibility NLP", disease:"Cancer", method:"ML", evidence:"Model", n:205, tag:"NLP"},
  {title:"Alzheimer's trial inclusion patterns", disease:"Alzheimer's", method:"Clinical", evidence:"Review", n:59, tag:"criteria"}
];

function value(id){ return document.getElementById(id).value; }
function filtered(){
  return data.filter(d =>
    (value("disease")==="All" || d.disease===value("disease")) &&
    (value("method")==="All" || d.method===value("method")) &&
    (value("evidence")==="All" || d.evidence===value("evidence"))
  );
}
function render(){
  const f = filtered();
  document.getElementById("papers").innerHTML = f.map(d => `
    <article class="card">
      <h3>${d.title}</h3>
      <p>${d.disease} · ${d.method} · ${d.evidence}</p>
      <div class="chips"><span>${d.n} samples</span><span>${d.tag}</span></div>
    </article>`).join("") || `<article class="card"><h3>No papers match</h3><p>Try broadening the filters.</p></article>`;
  document.getElementById("paperCount").textContent = f.length;
  document.getElementById("sampleTotal").textContent = f.reduce((a,d)=>a+d.n,0);
  const counts = {};
  f.forEach(d => counts[d.method] = (counts[d.method]||0)+1);
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById("topMethod").textContent = top ? top[0] : "—";
  draw(f);
}
function draw(f){
  const c = document.getElementById("chart");
  const ctx = c.getContext("2d");
  const w = c.width, h = c.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#a8abb5";
  ctx.font = "18px Inter, system-ui";
  if(!f.length){ ctx.fillText("No data to visualize.", 40, 60); return; }
  const max = Math.max(...f.map(d=>d.n), 1);
  const barW = Math.max(24, Math.min(58, (w-100)/f.length - 10));
  f.forEach((d,i)=>{
    const x = 50 + i*((w-100)/f.length);
    const bh = d.n/max*(h-95);
    const y = h-50-bh;
    ctx.fillStyle = d.method==="ML" ? "#b66cff" : d.method==="RNA-seq" ? "#82e0ac" : d.method==="Clinical" ? "#f4c86a" : "#e34b55";
    ctx.fillRect(x,y,barW,bh);
    ctx.fillStyle = "#f6f4ef";
    ctx.font = "13px Inter, system-ui";
    ctx.fillText(d.n, x, y-8);
    ctx.fillStyle = "#a8abb5";
    ctx.save();
    ctx.translate(x+barW/2,h-26);
    ctx.rotate(-0.65);
    ctx.fillText(d.disease.slice(0,13),0,0);
    ctx.restore();
  });
}
["disease","method","evidence"].forEach(id => document.getElementById(id).addEventListener("change", render));
render();

</script>
</body>
</html>
