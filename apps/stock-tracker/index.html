<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock Tracker</title>
<style>
:root{--bg:#08090d;--panel:#141620;--line:#2a2e3b;--text:#f6f4ef;--muted:#a8abb5;--accent:#b66cff;--red:#e34b55;--green:#82e0ac;--amber:#f4c86a}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0%,rgba(182,108,255,.15),transparent 30%),radial-gradient(circle at 90% 20%,rgba(130,224,172,.1),transparent 30%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;opacity:.15;pointer-events:none}
main{max-width:1180px;margin:auto;padding:42px 22px;position:relative}a{color:inherit}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:28px}.kicker{color:var(--accent);text-transform:uppercase;letter-spacing:.18em;font-size:.76rem;font-weight:900}
h1{font-size:clamp(2.8rem,7vw,6rem);line-height:.9;letter-spacing:-.07em;margin:8px 0 14px}h2,h3{letter-spacing:-.03em}.muted,p{color:var(--muted);line-height:1.65}.panel,.card{border:1px solid var(--line);background:linear-gradient(145deg,var(--panel),rgba(255,255,255,.035));border-radius:26px;padding:24px;box-shadow:0 28px 80px rgba(0,0,0,.26)}.btn,button,select,input,textarea{font:inherit}
.btn,button{border:1px solid var(--line);background:#1b1d28;color:var(--text);border-radius:999px;padding:12px 18px;font-weight:800;cursor:pointer}.btn:hover,button:hover{border-color:var(--accent)}select,input,textarea{width:100%;border:1px solid var(--line);background:#10121a;color:var(--text);border-radius:16px;padding:14px}textarea{min-height:230px;resize:vertical}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}.chips{display:flex;gap:8px;flex-wrap:wrap}.chips span{border:1px solid var(--line);border-radius:999px;padding:6px 10px;color:var(--muted);font-size:.85rem}.stat{font-size:2.2rem;font-weight:950}.good{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--amber)}ul{line-height:1.85;color:var(--muted)}canvas{width:100%;height:auto;border:1px solid var(--line);border-radius:22px;background:#0b0d14}.section{margin-top:24px}@media(max-width:760px){.grid,.grid3{grid-template-columns:1fr}h1{font-size:3.2rem}}
</style>
</head>
<body>
<main>
  <div class="top">
    <div>
      <div class="kicker">David Shen Project</div>
      <h1>Stock Tracker</h1>
      <p class="muted">Demo finance dashboard with watchlist cards, sparkline charts, and percent-change logic.</p>
    </div>
    <a class="btn" href="../../index.html">All projects</a>
  </div>
  
<div class="grid">
  <section class="panel">
    <h2>Watchlist</h2>
    <label><strong>Ticker</strong><select id="ticker">
      <option>AAPL</option><option>MSFT</option><option>NVDA</option><option>GOOGL</option><option>AMZN</option><option>META</option><option>TSLA</option><option>JPM</option><option>UNH</option><option>LLY</option><option>PFE</option><option>MRNA</option><option>SPY</option><option>QQQ</option><option>BTC</option><option>ETH</option>
    </select></label>
    <div class="chips" style="margin-top:14px">
      <button onclick="render()">Load chart</button>
      <button onclick="shuffleMarket()">Shuffle demo market</button>
      <button onclick="addToWatchlist()">Add card</button>
    </div>
    <p class="muted">Demo data only; no live financial API. Built to show front-end state, charting, and percentage-change logic.</p>
  </section>
  <section class="panel">
    <h2 id="tickerTitle">AAPL</h2>
    <div class="stat" id="price">$0</div>
    <p id="change" class="muted"></p>
    <div class="grid3">
      <div><strong>Open</strong><p id="openVal"></p></div>
      <div><strong>High</strong><p id="highVal"></p></div>
      <div><strong>Low</strong><p id="lowVal"></p></div>
    </div>
  </section>
</div>
<section class="panel section">
  <canvas id="chart" width="1000" height="360"></canvas>
</section>
<section class="section">
  <h2>Market cards</h2>
  <div id="cards" class="grid3"></div>
</section>

</main>
<script>

const base = {
  AAPL:{price:190,sector:"Consumer tech"}, MSFT:{price:430,sector:"Software"}, NVDA:{price:125,sector:"AI chips"},
  GOOGL:{price:175,sector:"Search/cloud"}, AMZN:{price:185,sector:"E-commerce/cloud"}, META:{price:500,sector:"Social/AI"},
  TSLA:{price:180,sector:"EV"}, JPM:{price:200,sector:"Banking"}, UNH:{price:510,sector:"Health insurance"},
  LLY:{price:880,sector:"Pharma"}, PFE:{price:28,sector:"Pharma"}, MRNA:{price:150,sector:"Biotech"},
  SPY:{price:540,sector:"ETF"}, QQQ:{price:465,sector:"ETF"}, BTC:{price:65000,sector:"Crypto"}, ETH:{price:3500,sector:"Crypto"}
};
let seed = 4;
function rng(){ seed = (seed*9301+49297)%233280; return seed/233280; }
function series(t){
  let v = base[t].price;
  const arr = [];
  const drift = (t.charCodeAt(0)%7 - 3) / 1000;
  for(let i=0;i<72;i++){
    v *= 1 + drift + Math.sin((i+t.length)/7)*0.004 + (rng()-0.5)*0.018;
    arr.push(+v.toFixed(t==="BTC"||t==="ETH"?0:2));
  }
  return arr;
}
function money(v){ return "$" + Number(v).toLocaleString(undefined,{maximumFractionDigits:2}); }
function render(){
  const t = document.getElementById("ticker").value;
  const arr = series(t);
  const first = arr[0], last = arr[arr.length-1], hi = Math.max(...arr), lo = Math.min(...arr);
  const pct = ((last/first-1)*100);
  document.getElementById("tickerTitle").textContent = `${t} · ${base[t].sector}`;
  document.getElementById("price").textContent = money(last);
  document.getElementById("change").innerHTML = `<span class="${pct>=0?'good':'bad'}">${pct>=0?'+':''}${pct.toFixed(2)}%</span> over demo period`;
  document.getElementById("openVal").textContent = money(first);
  document.getElementById("highVal").textContent = money(hi);
  document.getElementById("lowVal").textContent = money(lo);
  draw(arr,pct);
  renderCards();
}
function draw(arr,pct){
  const c = document.getElementById("chart"), ctx = c.getContext("2d"), w=c.width, h=c.height;
  ctx.clearRect(0,0,w,h);
  const min=Math.min(...arr), max=Math.max(...arr);
  ctx.strokeStyle="#2a2e3b"; ctx.lineWidth=1;
  for(let y=50;y<h-40;y+=55){ctx.beginPath();ctx.moveTo(45,y);ctx.lineTo(w-30,y);ctx.stroke();}
  ctx.strokeStyle = pct>=0 ? "#82e0ac" : "#e34b55";
  ctx.lineWidth=4; ctx.beginPath();
  arr.forEach((v,i)=>{const x=55+i*(w-90)/(arr.length-1), y=h-50-(v-min)/(max-min||1)*(h-100); i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.stroke();
}
function cardHtml(t){
  const arr = series(t), first=arr[0], last=arr[arr.length-1], pct=((last/first-1)*100);
  return `<article class="card"><h3>${t}</h3><p>${base[t].sector}</p><div class="stat">${money(last)}</div><p class="${pct>=0?'good':'bad'}">${pct>=0?'+':''}${pct.toFixed(2)}%</p><div class="chips"><span>demo</span><span>${arr.length} pts</span></div></article>`;
}
function renderCards(){
  const tickers = ["AAPL","MSFT","NVDA","LLY","JPM","SPY","QQQ","BTC","PFE"];
  document.getElementById("cards").innerHTML = tickers.map(cardHtml).join("");
}
function shuffleMarket(){ seed = Math.floor(Math.random()*9999)+1; render(); }
function addToWatchlist(){
  const t = document.getElementById("ticker").value;
  const el = document.createElement("div");
  el.innerHTML = cardHtml(t);
  document.getElementById("cards").prepend(el.firstElementChild);
}
document.getElementById("ticker").addEventListener("change", render);
render();

</script>
</body>
</html>
