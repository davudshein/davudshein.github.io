<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stock Tracker</title><style>
:root{--bg:#08090d;--panel:#141620;--line:#2a2e3b;--text:#f6f4ef;--muted:#a8abb5;--accent:#b66cff;--red:#e34b55;--green:#82e0ac;--amber:#f4c86a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0%,rgba(182,108,255,.15),transparent 30%),radial-gradient(circle at 90% 20%,rgba(130,224,172,.1),transparent 30%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;opacity:.15;pointer-events:none}main{max-width:1180px;margin:auto;padding:42px 22px;position:relative}a{color:inherit}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:28px}.kicker{color:var(--accent);text-transform:uppercase;letter-spacing:.18em;font-size:.76rem;font-weight:900}h1{font-size:clamp(2.8rem,7vw,6rem);line-height:.9;letter-spacing:-.07em;margin:8px 0 14px}h2,h3{letter-spacing:-.03em}.muted,p{color:var(--muted);line-height:1.65}.panel,.card{border:1px solid var(--line);background:linear-gradient(145deg,var(--panel),rgba(255,255,255,.035));border-radius:26px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.35)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.four{grid-template-columns:repeat(4,minmax(0,1fr))}button,.btn{border:1px solid var(--line);background:#1b1d28;color:var(--text);border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer;text-decoration:none;font:inherit}input,select,textarea{width:100%;border:1px solid var(--line);background:#10121a;color:var(--text);border-radius:14px;padding:12px;font:inherit}label{display:grid;gap:8px;color:var(--muted);font-weight:750}input[type=range]{accent-color:var(--accent);padding:0}.score{font-size:3.2rem;font-weight:950;letter-spacing:-.06em;color:var(--text)}.bar{height:12px;background:#242736;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--accent),var(--green));width:0}.chips{display:flex;gap:8px;flex-wrap:wrap}.chips span{border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted)}canvas,svg{max-width:100%;border:1px solid var(--line);border-radius:20px;background:#0d0f16}.navlink{white-space:nowrap}@media(max-width:800px){.grid,.three,.four{grid-template-columns:1fr}.top{display:block}h1{font-size:3rem}}
</style></head><body><main><div class="top"><div><div class="kicker">David Shen Project</div><h1>Stock Tracker</h1><p>Demo watchlist with mock price data, simple returns, and a canvas chart.</p></div><a class="btn navlink" href="../../index.html">All projects</a></div>
<section class="grid"><div class="panel"><label>Ticker<select id="ticker"><option>AAPL</option><option>NVDA</option><option>MSFT</option><option>SPY</option><option>BTC</option></select></label><br><button onclick="render()">Load demo chart</button><p class="muted">Demo data only; no live financial API.</p></div><div class="panel"><p>Latest demo price</p><div class="score" id="price">--</div><p id="change"></p></div></section><section class="panel" style="margin-top:18px"><canvas id="chart" width="980" height="360"></canvas></section><script>
const base={AAPL:190,NVDA:125,MSFT:430,SPY:540,BTC:65000};function series(t){let v=base[t],arr=[];for(let i=0;i<40;i++){v*=1+(Math.sin(i/5+t.length)*.006+(Math.random()-.5)*.012);arr.push(+v.toFixed(2))}return arr}function render(){let t=ticker.value,arr=series(t),first=arr[0],last=arr[arr.length-1];price.textContent=(t==='BTC'?'$':'$')+last.toLocaleString();let pct=((last/first-1)*100).toFixed(2);change.textContent=(pct>=0?'+':'')+pct+'% over demo period';draw(arr)}function draw(arr){let c=chart.getContext('2d'),w=chart.width,h=chart.height;c.clearRect(0,0,w,h);let min=Math.min(...arr),max=Math.max(...arr);c.strokeStyle='#2a2e3b';for(let y=40;y<h-40;y+=60){c.beginPath();c.moveTo(50,y);c.lineTo(w-30,y);c.stroke()}c.strokeStyle='#82e0ac';c.lineWidth=4;c.beginPath();arr.forEach((v,i)=>{let x=60+i*(w-110)/(arr.length-1),y=h-50-(v-min)/(max-min||1)*(h-100);i?c.lineTo(x,y):c.moveTo(x,y)});c.stroke()}render();</script></main></body></html>
