<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Molecule Designer</title><style>
:root{--bg:#08090d;--panel:#141620;--line:#2a2e3b;--text:#f6f4ef;--muted:#a8abb5;--accent:#b66cff;--red:#e34b55;--green:#82e0ac;--amber:#f4c86a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0%,rgba(182,108,255,.15),transparent 30%),radial-gradient(circle at 90% 20%,rgba(130,224,172,.1),transparent 30%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;opacity:.15;pointer-events:none}main{max-width:1180px;margin:auto;padding:42px 22px;position:relative}a{color:inherit}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:28px}.kicker{color:var(--accent);text-transform:uppercase;letter-spacing:.18em;font-size:.76rem;font-weight:900}h1{font-size:clamp(2.8rem,7vw,6rem);line-height:.9;letter-spacing:-.07em;margin:8px 0 14px}h2,h3{letter-spacing:-.03em}.muted,p{color:var(--muted);line-height:1.65}.panel,.card{border:1px solid var(--line);background:linear-gradient(145deg,var(--panel),rgba(255,255,255,.035));border-radius:26px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.35)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.four{grid-template-columns:repeat(4,minmax(0,1fr))}button,.btn{border:1px solid var(--line);background:#1b1d28;color:var(--text);border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer;text-decoration:none;font:inherit}input,select,textarea{width:100%;border:1px solid var(--line);background:#10121a;color:var(--text);border-radius:14px;padding:12px;font:inherit}label{display:grid;gap:8px;color:var(--muted);font-weight:750}input[type=range]{accent-color:var(--accent);padding:0}.score{font-size:3.2rem;font-weight:950;letter-spacing:-.06em;color:var(--text)}.bar{height:12px;background:#242736;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--accent),var(--green));width:0}.chips{display:flex;gap:8px;flex-wrap:wrap}.chips span{border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted)}canvas,svg{max-width:100%;border:1px solid var(--line);border-radius:20px;background:#0d0f16}.navlink{white-space:nowrap}@media(max-width:800px){.grid,.three,.four{grid-template-columns:1fr}.top{display:block}h1{font-size:3rem}}
</style></head><body><main><div class="top"><div><div class="kicker">David Shen Project</div><h1>Molecule Designer</h1><p>Medicinal-chemistry toy for designing molecule concepts and scoring drug-likeness.</p></div><a class="btn navlink" href="../../index.html">All projects</a></div>
<section class="grid"><div class="panel"><label>Scaffold<select id="scaffold"><option value="hetero">Heteroaromatic ring</option><option value="aromatic">Aromatic ring</option><option value="fused">Fused ring</option><option value="chain">Flexible chain</option></select></label><br><label>Polar handle<select id="polar"><option value="amide">Amide</option><option value="amine">Amine</option><option value="alcohol">Alcohol</option><option value="acid">Carboxylic acid</option><option value="none">None</option></select></label><br><label>Hydrophobic group<select id="hydro"><option value="phenyl">Phenyl</option><option value="halogen">Halogen</option><option value="methyl">Methyl</option><option value="tertbutyl">tert-Butyl</option></select></label><br><label>Flexibility<input id="flex" type="range" min="0" max="10" value="4"></label><br><label>Size<input id="size" type="range" min="0" max="10" value="6"></label><br><button id="randomize">Generate variant</button></div><div class="panel"><canvas id="canvas" width="520" height="380"></canvas></div></section><section class="panel" style="margin-top:18px"><div class="grid three"><div><p>Realism</p><div class="score" id="realism">--</div></div><div><p>Drug-likeness</p><div class="score" id="drug">--</div></div><div><p>BACE1 fit</p><div class="score" id="bace">--</div></div></div><div class="bar"><span id="bar"></span></div><ul id="notes"></ul></section><script>
const ctx=canvas.getContext('2d');['scaffold','polar','hydro','flex','size'].forEach(id=>document.getElementById(id).oninput=update);randomize.onclick=()=>{for(const id of ['scaffold','polar','hydro']){let e=document.getElementById(id);e.selectedIndex=Math.floor(Math.random()*e.options.length)}flex.value=Math.floor(Math.random()*11);size.value=Math.floor(Math.random()*11);update()};function clip(n){return Math.max(5,Math.min(99,Math.round(n)))}function calc(){let r=72,d=70,b=62,n=[];if(scaffold.value==='hetero'){r+=8;d+=8;n.push('Heteroaromatic core improves polarity and binding options.')}if(scaffold.value==='aromatic'){r+=6;b+=10;n.push('Aromatic core can support hydrophobic pocket interactions.')}if(scaffold.value==='fused'){b+=10;d-=6;n.push('Fused ring may increase potency but adds size risk.')}if(scaffold.value==='chain'){r+=2;b-=8;n.push('Flexible chain is realistic but less shape-defined.')}if(polar.value==='amide'){r+=8;d+=12;n.push('Amide adds H-bonding and medicinal-chemistry stability.')}if(polar.value==='acid'){d-=7;b-=7;n.push('Acid increases polarity and may hurt CNS-like properties.')}if(polar.value==='none'){d-=10;n.push('No polar handle can reduce solubility.')}if(hydro.value==='phenyl'){b+=8;d-=2;n.push('Phenyl may fill hydrophobic pockets but adds lipophilicity.')}if(hydro.value==='tertbutyl'){d-=8;r-=2;n.push('Bulky group may hurt fit and solubility.')}if(hydro.value==='halogen'){r+=3;b+=4;n.push('Halogen can tune potency and metabolic stability.')}d-=Math.max(0,+flex.value-6)*5;r-=Math.max(0,+flex.value-7)*4;b-=Math.abs(+size.value-6)*3;return{r:clip(r),d:clip(d),b:clip(b),n}}function update(){let s=calc();realism.textContent=s.r;drug.textContent=s.d;bace.textContent=s.b;bar.style.width=Math.round((s.r+s.d+s.b)/3)+'%';notes.innerHTML=s.n.map(x=>'<li>'+x+'</li>').join('');draw()}function atom(x,y,t,c){ctx.beginPath();ctx.fillStyle='#090a0f';ctx.strokeStyle=c;ctx.lineWidth=4;ctx.arc(x,y,23,0,7);ctx.fill();ctx.stroke();ctx.fillStyle='#f6f4ef';ctx.font='700 14px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,x,y)}function bond(x1,y1,x2,y2){ctx.strokeStyle='#a8abb5';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}function draw(){ctx.clearRect(0,0,520,380);ctx.save();ctx.translate(260,190);let pts=[];if(scaffold.value==='chain'){[-100,-50,0,50,100].forEach((x,i)=>{atom(x,i%2?-30:0,'C','#b66cff');if(i)bond([-100,-50,0,50][i-1],(i-1)%2?-30:0,x,i%2?-30:0)});pts=[[-100,0],[100,0]]}else{let R=scaffold.value==='fused'?58:72;for(let i=0;i<6;i++){let a=-Math.PI/2+i*2*Math.PI/6;pts.push([Math.cos(a)*R,Math.sin(a)*R])}ctx.strokeStyle='#b66cff';ctx.lineWidth=4;ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(...p):ctx.moveTo(...p));ctx.closePath();ctx.stroke();pts.forEach((p,i)=>atom(p[0],p[1],scaffold.value==='hetero'&&i===2?'N':'C',scaffold.value==='hetero'&&i===2?'#82e0ac':'#b66cff'))}bond(pts[0][0],pts[0][1],pts[0][0]-80,pts[0][1]-58);atom(pts[0][0]-105,pts[0][1]-78,polar.value==='amide'?'CONH':polar.value==='acid'?'CO2H':polar.value==='amine'?'N':polar.value==='alcohol'?'OH':'H','#82e0ac');bond(pts[1][0],pts[1][1],pts[1][0]+85,pts[1][1]+55);atom(pts[1][0]+110,pts[1][1]+70,hydro.value==='halogen'?'Cl':hydro.value==='tertbutyl'?'tBu':hydro.value==='methyl'?'Me':'Ph','#e34b55');ctx.restore()}update();</script></main></body></html>
