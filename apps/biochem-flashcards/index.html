<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Biochem Flashcards</title>
<style>
:root{--bg:#08090d;--panel:#141620;--line:#2a2e3b;--text:#f6f4ef;--muted:#a8abb5;--accent:#b66cff;--red:#e34b55;--green:#82e0ac;--amber:#f4c86a}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0%,rgba(182,108,255,.15),transparent 30%),radial-gradient(circle at 90% 20%,rgba(130,224,172,.1),transparent 30%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;opacity:.15;pointer-events:none}
main{max-width:1180px;margin:auto;padding:42px 22px;position:relative}a{color:inherit}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:28px}.kicker{color:var(--accent);text-transform:uppercase;letter-spacing:.18em;font-size:.76rem;font-weight:900}
h1{font-size:clamp(2.8rem,7vw,6rem);line-height:.9;letter-spacing:-.07em;margin:8px 0 14px}h2,h3{letter-spacing:-.03em}.muted,p{color:var(--muted);line-height:1.65}.panel,.card{border:1px solid var(--line);background:linear-gradient(145deg,var(--panel),rgba(255,255,255,.035));border-radius:26px;padding:24px;box-shadow:0 28px 80px rgba(0,0,0,.26)}.btn,button,select,input,textarea{font:inherit}
.btn,button{border:1px solid var(--line);background:#1b1d28;color:var(--text);border-radius:999px;padding:12px 18px;font-weight:800;cursor:pointer}.btn:hover,button:hover{border-color:var(--accent)}select,input,textarea{width:100%;border:1px solid var(--line);background:#10121a;color:var(--text);border-radius:16px;padding:14px}textarea{min-height:230px;resize:vertical}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}.chips{display:flex;gap:8px;flex-wrap:wrap}.chips span{border:1px solid var(--line);border-radius:999px;padding:6px 10px;color:var(--muted);font-size:.85rem}.stat{font-size:2.2rem;font-weight:950}.good{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--amber)}ul{line-height:1.85;color:var(--muted)}canvas{width:100%;height:auto;border:1px solid var(--line);border-radius:22px;background:#0b0d14}.section{margin-top:24px}@media(max-width:760px){.grid,.grid3{grid-template-columns:1fr}h1{font-size:3.2rem}}
</style>
</head>
<body>
<main>
  <div class="top">
    <div>
      <div class="kicker">David Shen Project</div>
      <h1>Biochem Flashcards</h1>
      <p class="muted">Flashcard app for enzymes, amino acids, genomics, ML, and medicinal chemistry vocabulary.</p>
    </div>
    <a class="btn" href="../../index.html">All projects</a>
  </div>
  
<section class="panel">
  <div class="grid3">
    <label><strong>Topic</strong><select id="topic"><option>All</option><option>ML</option><option>Medicinal chemistry</option><option>Genomics</option><option>Enzymes</option><option>Amino acids</option><option>Clinical research</option></select></label>
    <label><strong>Mode</strong><select id="mode"><option>Review</option><option>Random</option><option>Generated</option></select></label>
    <div><strong>Progress</strong><div class="stat" id="count">0 / 0</div></div>
  </div>
  <div class="card section" style="min-height:260px;text-align:center;display:grid;place-items:center">
    <div>
      <div class="kicker" id="category">ML</div>
      <h2 id="front">Question</h2>
      <p id="back" style="display:none;font-size:1.25rem"></p>
    </div>
  </div>
  <div class="chips">
    <button onclick="flip()">Flip</button>
    <button onclick="nextCard()">Next</button>
    <button onclick="randomCard()">Random</button>
    <button onclick="generateCard()">Generate new card</button>
  </div>
</section>
<section class="panel section">
  <h2>Deck stats</h2>
  <div class="grid3">
    <div><div class="stat" id="deckSize">0</div><p>Total cards</p></div>
    <div><div class="stat" id="generatedSize">0</div><p>Generated cards</p></div>
    <div><div class="stat" id="topicCount">0</div><p>Visible topic cards</p></div>
  </div>
</section>

</main>
<script>

let cards = [
  ["Medicinal chemistry","What is LogP?","A measure of lipophilicity; higher LogP usually means more hydrophobic."],
  ["Medicinal chemistry","What is a hydrogen-bond donor?","A group that can donate a hydrogen bond, often N-H or O-H."],
  ["Medicinal chemistry","Why can too many rotatable bonds hurt drug-likeness?","They increase flexibility and can reduce binding specificity and oral bioavailability."],
  ["Medicinal chemistry","What is a scaffold?","The core structural framework of a molecule that substitutions are built around."],
  ["Medicinal chemistry","What is QSAR?","Quantitative structure-activity relationship modeling links molecular descriptors to biological activity."],
  ["Genomics","What is exon skipping?","A splicing event where an exon is omitted from mature RNA."],
  ["Genomics","What is a cryptic splice site?","A normally unused splice site that becomes activated and can disrupt RNA processing."],
  ["Genomics","What is allele-specific expression?","Unequal expression of the two alleles of a gene."],
  ["Genomics","What is an expression outlier?","A gene whose expression is unusually high or low relative to a reference population."],
  ["Genomics","Why use long-read RNA sequencing?","It can capture full-length transcripts and reveal isoforms that short reads may miss."],
  ["Enzymes","What does BACE1 do?","BACE1 is a beta-secretase involved in amyloid precursor protein cleavage."],
  ["Enzymes","What is an inhibitor?","A molecule that decreases the activity of an enzyme or protein target."],
  ["Enzymes","What is Km?","The substrate concentration at which reaction rate is half of Vmax."],
  ["Enzymes","What is Vmax?","The maximum reaction velocity under saturating substrate conditions."],
  ["Amino acids","Which amino acids contain sulfur?","Cysteine and methionine."],
  ["Amino acids","Which amino acids are aromatic?","Phenylalanine, tyrosine, and tryptophan."],
  ["Amino acids","Which amino acids are positively charged?","Lysine, arginine, and histidine."],
  ["Amino acids","Which amino acids are negatively charged?","Aspartate and glutamate."],
  ["ML","What is overfitting?","When a model fits training data too closely and generalizes poorly."],
  ["ML","What is cross-validation?","A strategy for estimating model performance by repeatedly training/testing on different splits."],
  ["ML","What is regularization?","A constraint or penalty that reduces model complexity to improve generalization."],
  ["ML","What is a feature?","An input variable used by a model to make predictions."],
  ["ML","What is R²?","A metric describing how much variance in the outcome a model explains."],
  ["Clinical research","What is an inclusion criterion?","A condition a participant must meet to enroll in a study."],
  ["Clinical research","What is an exclusion criterion?","A condition that prevents enrollment because of safety, confounding, or design reasons."],
  ["Clinical research","What is a confounder?","A variable related to both exposure and outcome that can distort an association."],
  ["Clinical research","What is informed consent?","A process ensuring a participant understands risks, benefits, and alternatives before joining."]
];
let i = 0, shown = false, generated = 0;

function visibleCards(){
  const t = document.getElementById("topic").value;
  return cards.map((c,idx)=>({c,idx})).filter(x => t==="All" || x.c[0]===t);
}
function current(){
  const v = visibleCards();
  if(!v.length) return {c:["None","No cards","Change the topic filter."], idx:0, pos:0, total:0};
  const pos = ((i % v.length) + v.length) % v.length;
  return {...v[pos], pos, total:v.length};
}
function render(){
  const cur = current();
  document.getElementById("category").textContent = cur.c[0];
  document.getElementById("front").textContent = cur.c[1];
  document.getElementById("back").textContent = cur.c[2];
  document.getElementById("back").style.display = shown ? "block" : "none";
  document.getElementById("count").textContent = `${cur.pos+1} / ${cur.total}`;
  document.getElementById("deckSize").textContent = cards.length;
  document.getElementById("generatedSize").textContent = generated;
  document.getElementById("topicCount").textContent = cur.total;
}
function flip(){ shown = !shown; render(); }
function nextCard(){ i++; shown=false; render(); }
function randomCard(){ const v=visibleCards(); i = Math.floor(Math.random()*Math.max(1,v.length)); shown=false; render(); }
function generateCard(){
  const templates = [
    ["Medicinal chemistry","Why does polarity matter in drug design?","Polarity affects solubility, permeability, binding interactions, and clearance."],
    ["ML","Why separate training and test sets?","To estimate whether a model generalizes beyond the examples it memorized."],
    ["Genomics","Why can RNA reveal disease clues DNA misses?","RNA shows expression and splicing consequences that may not be obvious from DNA sequence alone."],
    ["Clinical research","Why parse eligibility criteria?","Structured criteria make screening more consistent and reduce manual review burden."],
    ["Enzymes","Why model enzyme inhibitors?","Predicted activity helps prioritize compounds before expensive wet-lab testing."]
  ];
  const pick = templates[Math.floor(Math.random()*templates.length)];
  cards.push([pick[0], pick[1] + ` #${generated+1}`, pick[2]]);
  generated++;
  document.getElementById("topic").value = "All";
  i = cards.length - 1;
  shown = false;
  render();
}
document.getElementById("topic").addEventListener("change", ()=>{i=0;shown=false;render();});
document.getElementById("mode").addEventListener("change", ()=>{
  if(document.getElementById("mode").value==="Random") randomCard();
  if(document.getElementById("mode").value==="Generated") generateCard();
});
render();

</script>
</body>
</html>
