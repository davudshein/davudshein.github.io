<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RareDx Splicing Explainer</title><style>
:root{--bg:#08090d;--panel:#141620;--line:#2a2e3b;--text:#f6f4ef;--muted:#a8abb5;--accent:#b66cff;--red:#e34b55;--green:#82e0ac;--amber:#f4c86a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0%,rgba(182,108,255,.15),transparent 30%),radial-gradient(circle at 90% 20%,rgba(130,224,172,.1),transparent 30%),var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;opacity:.15;pointer-events:none}main{max-width:1180px;margin:auto;padding:42px 22px;position:relative}a{color:inherit}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:28px}.kicker{color:var(--accent);text-transform:uppercase;letter-spacing:.18em;font-size:.76rem;font-weight:900}h1{font-size:clamp(2.8rem,7vw,6rem);line-height:.9;letter-spacing:-.07em;margin:8px 0 14px}h2,h3{letter-spacing:-.03em}.muted,p{color:var(--muted);line-height:1.65}.panel,.card{border:1px solid var(--line);background:linear-gradient(145deg,var(--panel),rgba(255,255,255,.035));border-radius:26px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.35)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.four{grid-template-columns:repeat(4,minmax(0,1fr))}button,.btn{border:1px solid var(--line);background:#1b1d28;color:var(--text);border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer;text-decoration:none;font:inherit}input,select,textarea{width:100%;border:1px solid var(--line);background:#10121a;color:var(--text);border-radius:14px;padding:12px;font:inherit}label{display:grid;gap:8px;color:var(--muted);font-weight:750}input[type=range]{accent-color:var(--accent);padding:0}.score{font-size:3.2rem;font-weight:950;letter-spacing:-.06em;color:var(--text)}.bar{height:12px;background:#242736;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--accent),var(--green));width:0}.chips{display:flex;gap:8px;flex-wrap:wrap}.chips span{border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:var(--muted)}canvas,svg{max-width:100%;border:1px solid var(--line);border-radius:20px;background:#0d0f16}.navlink{white-space:nowrap}@media(max-width:800px){.grid,.three,.four{grid-template-columns:1fr}.top{display:block}h1{font-size:3rem}}
</style></head><body><main><div class="top"><div><div class="kicker">David Shen Project</div><h1>RareDx Splicing Explainer</h1><p>Interactive genomics explainer for splicing and rare disease diagnostic clues.</p></div><a class="btn navlink" href="../../index.html">All projects</a></div>
<section class="grid"><div class="panel"><label>Variant type<select id="variant"><option value="skip">Exon skipping</option><option value="cryptic">Cryptic splice site</option><option value="retention">Intron retention</option><option value="outlier">Expression outlier</option></select></label><br><label>Signal strength<input id="strength" type="range" min="0" max="100" value="62"></label><br><button onclick="randomCase()">Generate case</button></div><div class="panel"><h2 id="caseTitle">Case</h2><p id="caseText"></p><div class="score" id="confidence">--</div><p>diagnostic confidence</p></div></section><section class="panel" style="margin-top:18px"><svg id="gene" viewBox="0 0 1000 260"></svg></section><script>
variant.oninput=strength.oninput=update;function randomCase(){variant.selectedIndex=Math.floor(Math.random()*variant.options.length);strength.value=Math.floor(30+Math.random()*70);update()}function update(){let v=variant.value,s=+strength.value;confidence.textContent=s+'%';let txt={skip:'RNA reads suggest an exon is skipped, potentially disrupting the protein reading frame.',cryptic:'Reads support a cryptic splice site that creates an abnormal transcript.',retention:'Intron retention may introduce premature stop codons or unstable RNA.',outlier:'Expression appears unusually high or low compared with a reference cohort.'};caseTitle.textContent=variant.options[variant.selectedIndex].text;caseText.textContent=txt[v];draw(v,s)}function draw(v,s){let svg=gene;svg.innerHTML='';function el(t,a){let e=document.createElementNS('http://www.w3.org/2000/svg',t);for(let k in a)e.setAttribute(k,a[k]);svg.appendChild(e);return e}el('line',{x1:80,y1:130,x2:920,y2:130,stroke:'#a8abb5','stroke-width':6});let xs=[120,270,420,570,720];xs.forEach((x,i)=>{let color=v==='skip'&&i===2?'#e34b55':'#b66cff';el('rect',{x,y:95,width:90,height:70,rx:12,fill:color,opacity:.9});let text=el('text',{x:x+45,y:138,fill:'#fff','text-anchor':'middle','font-size':18,'font-weight':700});text.textContent='Exon '+(i+1)});if(v==='cryptic')el('path',{d:'M475 90 C520 35,590 35,635 90',stroke:'#82e0ac','stroke-width':6,fill:'none'});if(v==='retention')el('rect',{x:510,y:116,width:130,height:28,rx:12,fill:'#f4c86a'});if(v==='outlier')for(let i=0;i<8;i++)el('circle',{cx:130+i*92,cy:45+Math.random()*30,r:6+s/20,fill:'#82e0ac',opacity:.6});}update();</script></main></body></html>
